name: Build

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Platform to build'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - ubuntu-latest
          - macos-latest
          - windows-latest

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ inputs.os == 'all' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON(format('["{0}"]', inputs.os)) }}

    runs-on: ${{ matrix.os }}

    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Eigen3 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev

      - name: Install Eigen3 (macOS)
        if: runner.os == 'macOS'
        run: brew install eigen

      - name: Install Eigen3 (Windows)
        if: runner.os == 'Windows'
        run: choco install eigen

      - name: Configure
        run: python3 waf configure

      - name: Build
        run: python3 waf build

      - name: Test
        run: python3 tests.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: song-analyzer-${{ runner.os }}
          path: |
            build/song-analyzer*
            LICENSE
            THIRD-PARTY-LICENSES
