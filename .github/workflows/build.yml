name: Build

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Platform to build'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - ubuntu-22.04
          - macos-14
          - windows-2022

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ inputs.os == 'all' && fromJSON('["ubuntu-22.04","macos-14","windows-2022"]') || fromJSON(format('["{0}"]', inputs.os)) }}

    runs-on: ${{ matrix.os }}

    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Eigen3 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev

      - name: Install Eigen3 (macOS)
        if: runner.os == 'macOS'
        run: brew install eigen

      - name: Install Eigen3 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # vcpkg's eigen3 package doesn't expose unsupported/ headers needed by essentia.
          # Eigen is header-only, so we just download and point pkg-config at it.
          curl -sL https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz | tar xz -C "$RUNNER_TEMP"
          EIGEN_DIR="$RUNNER_TEMP/eigen-3.4.0"
          mkdir -p "$EIGEN_DIR/lib/pkgconfig"
          printf 'prefix=%s\nName: Eigen3\nDescription: C++ template library for linear algebra\nVersion: 3.4.0\nCflags: -I${prefix}\n' "$EIGEN_DIR" > "$EIGEN_DIR/lib/pkgconfig/eigen3.pc"
          echo "PKG_CONFIG_PATH=$EIGEN_DIR/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: python3 waf configure

      - name: Build
        run: python3 waf build

      - name: Test
        run: python3 tests.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: song-analyzer-${{ runner.os }}
          path: |
            build/song-analyzer*
            LICENSE
            THIRD-PARTY-LICENSES
