name: Build

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Platform to build'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - ubuntu-22.04
          - macos-14
          - windows-2022
  workflow_call:
    inputs:
      os:
        type: string
        default: 'all'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ inputs.os == 'all' && fromJSON('["ubuntu-22.04","macos-14","windows-2022"]') || fromJSON(format('["{0}"]', inputs.os)) }}

    runs-on: ${{ matrix.os }}

    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Eigen3 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev

      - name: Install Eigen3 (macOS)
        if: runner.os == 'macOS'
        run: brew install eigen

      - name: Install Eigen3 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Eigen is header-only, so we just download and set up include paths.
          # Use MinGW's pkg-config since Strawberry Perl's is broken on the runner.
          curl -sL https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz | tar xz
          EIGEN_DIR="$(cygpath -m "$PWD/eigen-3.4.0")"
          mkdir -p "$EIGEN_DIR/lib/pkgconfig"
          printf 'Name: Eigen3\nDescription: C++ template library for linear algebra\nVersion: 3.4.0\nCflags: -I%s\n' "$EIGEN_DIR" > "$EIGEN_DIR/lib/pkgconfig/eigen3.pc"
          echo "PKG_CONFIG_PATH=$EIGEN_DIR/lib/pkgconfig" >> "$GITHUB_ENV"
          # Strawberry Perl's pkg-config is broken on this runner — it finds
          # eigen3 but doesn't return -I flags. Set CPATH so GCC finds Eigen
          # headers regardless.
          echo "CPATH=$EIGEN_DIR" >> "$GITHUB_ENV"

      - name: Configure
        run: python3 waf configure ${{ runner.os == 'Windows' && '--check-cxx-compiler=g++' || '' }}

      - name: Build
        run: python3 waf build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: song-analyzer-${{ runner.os }}
          path: |
            build/song-analyzer*
            LICENSE
            THIRD-PARTY-LICENSES

      - name: Test
        run: python3 tests.py
